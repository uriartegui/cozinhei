workflows:
  ios-workflow:
    name: iOS Build (Simulator)
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Gerar constants.dart
        script: |
          mkdir -p lib/core
          cat > lib/core/constants.dart << EOF
          class AppConstants {
            static const String groqApiKey = '$GROQ_API_KEY';
            static const String unsplashApiKey = '$UNSPLASH_API_KEY';
            static const String supabaseUrl = '$SUPABASE_URL';
            static const String supabaseAnonKey = '$SUPABASE_ANON_KEY';
          }
          EOF

      - name: Instalar dependências
        script: flutter pub get

      - name: Gerar código Drift
        script: dart run build_runner build --delete-conflicting-outputs

      - name: Build iOS Simulator
        script: |
          flutter build ios --debug --simulator --no-codesign

    artifacts:
      - build/ios/iphonesimulator/**/*.app

    publishing:
      email:
        recipients:
          - guiuriarte@gmail.com

  android-workflow:
    name: Android Build
    max_build_duration: 60
    environment:
      flutter: stable

    scripts:
      - name: Gerar constants.dart
        script: |
          cat > lib/core/constants.dart << EOF
          class AppConstants {
            static const String groqApiKey = '$GROQ_API_KEY';
            static const String unsplashApiKey = '$UNSPLASH_API_KEY';
            static const String supabaseUrl = '$SUPABASE_URL';
            static const String supabaseAnonKey = '$SUPABASE_ANON_KEY';
          }
          EOF

      - name: Instalar dependências
        script: flutter pub get

      - name: Gerar código Drift
        script: dart run build_runner build --delete-conflicting-outputs

      - name: Build APK
        script: flutter build apk --release

    artifacts:
      - build/app/outputs/flutter-apk/*.apk

    publishing:
      email:
        recipients:
          - guiuriarte@gmail.com