workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.guilherme.cozinhei"
    scripts:
      - name: Gerar constants.dart
        script: |
          cat > lib/core/constants.dart << EOF
          class AppConstants {
            static const String groqApiKey = '$GROQ_API_KEY';
            static const String unsplashApiKey = '$UNSPLASH_API_KEY';
            static const String supabaseUrl = '$SUPABASE_URL';
            static const String supabaseAnonKey = '$SUPABASE_ANON_KEY';
          }
          EOF
      - name: Instalar dependências
        script: flutter pub get
      - name: Gerar código Drift
        script: dart run build_runner build --delete-conflicting-outputs
      - name: Build iOS
        script: |
          flutter build ipa \
            --release \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - guiuriarte@gmail.com

  android-workflow:
    name: Android Build
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Gerar constants.dart
        script: |
          cat > lib/core/constants.dart << EOF
          class AppConstants {
            static const String groqApiKey = '$GROQ_API_KEY';
            static const String unsplashApiKey = '$UNSPLASH_API_KEY';
            static const String supabaseUrl = '$SUPABASE_URL';
            static const String supabaseAnonKey = '$SUPABASE_ANON_KEY';
          }
          EOF
      - name: Instalar dependências
        script: flutter pub get
      - name: Gerar código Drift
        script: dart run build_runner build --delete-conflicting-outputs
      - name: Build APK
        script: flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
    publishing:
      email:
        recipients:
          - guiuriarte@gmail.com
